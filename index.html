  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"227a311d-8e7a-41cd-b7ef-0ef7c5be564c\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<script>\n(function(){\n  try{\n    var l=document.createElement('link');\n    l.rel='stylesheet';\n    l.href='https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho+B1:wght@500;600;700;800&display=swap';\n    document.head.appendChild(l);\n  }catch(e){}\n})();\n<\u002Fscript>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased}\n::-webkit-scrollbar{width:8px;height:8px}\n::-webkit-scrollbar-thumb{background:#cdc9bd;border-radius:8px}\n::-webkit-scrollbar-track{background:transparent}\n.mser{font-family:'Shippori Mincho B1',serif}\n.mono{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"display:flex;flex-direction:column;height:100vh;background:#e8e7e1;color:#1d231e;font-family:'Noto Sans JP',sans-serif\">\n\n  <header style=\"flex:none;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#16432f;color:#f6f4ee;border-bottom:1px solid #0e2c1f\">\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <div style=\"display:flex;align-items:center;gap:9px\">\n        <div style=\"width:26px;height:26px;border-radius:7px;background:#1f9268;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff\">N<\u002Fdiv>\n        <div style=\"line-height:1.15\">\n          <div class=\"mser\" style=\"font-size:15px;font-weight:700;letter-spacing:.04em\">長野観光機構アプリ<\u002Fdiv>\n          <div style=\"font-size:10px;color:#9cc4b1;letter-spacing:.08em\">SCREEN DESIGN ・ 画面設計プロトタイプ<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;background:#0e2c1f;border-radius:10px;padding:3px;gap:2px\">\n      <button onclick=\"{{ pickMember }}\" style=\"{{ tabMemberStyle }}\">会員側 ・ スマホ<\u002Fbutton>\n      <button onclick=\"{{ pickAdmin }}\" style=\"{{ tabAdminStyle }}\">管理側 ・ 運営画面<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <aside style=\"flex:none;width:248px;background:#f6f4ee;border-right:1px solid #ddd8cc;overflow-y:auto;padding:18px 0\">\n      <div style=\"padding:0 20px 10px;font-size:11px;letter-spacing:.1em;color:#8a8a7e;font-weight:700\">{{ navHeading }}<\u002Fdiv>\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"9\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n          <span style=\"{{ item.dotStyle }}\"><\u002Fspan>\n          <span style=\"flex:1;text-align:left\">{{ item.label }}<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:10px;opacity:.55\">{{ item.code }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n      <div style=\"margin:16px 20px 0;padding-top:14px;border-top:1px solid #e3dece;font-size:11px;color:#9a9a8e;line-height:1.7\">\n        要件Excel「機能概要」より生成。左の項目で画面を切替えできます。\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <main style=\"flex:1;min-width:0;overflow:auto;background:#e8e7e1\">\n      <div style=\"min-height:100%;display:flex;flex-direction:column;justify-content:safe center;align-items:safe center;padding:40px 48px\">\n\n        <!-- ===================== MEMBER : マイページ 3案比較 ===================== -->\n        <sc-if value=\"{{ show.mypage }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:100%\">\n          <div style=\"text-align:center;margin-bottom:26px\">\n            <div class=\"mser\" style=\"font-size:22px;font-weight:700\">マイページ ・ 3つのデザイン案<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6b7268;margin-top:5px\">会員機能 / マイページ — 同じ情報を異なるレイアウト・写真量で比較<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:36px;justify-content:safe center;flex-wrap:wrap\">\n\n            <!-- 案A : カード積層型 -->\n            <div style=\"flex:none\">\n              <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:10px\">\n                <span style=\"font-size:12px;font-weight:700;color:#1c7a55;letter-spacing:.06em\">案A<\u002Fspan>\n                <span style=\"font-size:12px;color:#6b7268\">カード積層・機能重視<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"width:344px;height:720px;background:#11150f;border-radius:38px;padding:9px;box-shadow:0 24px 50px -18px rgba(20,40,30,.4)\">\n                <div style=\"width:100%;height:100%;background:#f6f4ee;border-radius:30px;overflow:hidden;display:flex;flex-direction:column;position:relative\">\n                  <div style=\"flex:none;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:12px;font-weight:600;color:#fff;background:#16432f\">\n                    <span>9:41<\u002Fspan><span style=\"letter-spacing:.1em\">●●● ⌶ 􀛨<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;overflow-y:auto\">\n                    <div style=\"background:#16432f;color:#f6f4ee;padding:18px 20px 26px;border-radius:0 0 24px 24px\">\n                      <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                        <div>\n                          <div style=\"font-size:12px;color:#9cc4b1\">こんにちは<\u002Fdiv>\n                          <div class=\"mser\" style=\"font-size:19px;font-weight:700;margin-top:2px\">田中 信州 さん<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.1);border:1px solid rgba(185,131,30,.6);border-radius:12px;padding:7px 12px\">\n                          <span style=\"font-size:9px;color:#e7c987;letter-spacing:.1em\">RANK<\u002Fspan>\n ar-gradient(135deg,#e2d3b0,#e2d3b0 12px,#d8c79f 12px,#d8c79f 24px);position:relative\"><span class=\"mono\" style=\"position:absolute;bottom:8px;left:10px;font-size:10px;color:#6b5a2e\">[ スポット写真 ]<\u002Fspan><span style=\"position:absolute;top:10px;left:10px;background:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:#1c7a55\">南信<\u002Fspan><\u002Fdiv><div style=\"padding:14px\"><div style=\"font-size:14px;font-weight:700\">天竜峡<\u002Fdiv><div style=\"font-size:11px;color:#8a8a7e;margin-top:4px;line-height:1.6\">通年 ・ 訪問記録 642件<\u002Fdiv><div style=\"display:flex;gap:8px;margin-top:12px\"><button style=\"flex:1;background:#f4f2ec;border:1px solid #e7e3d9;border-radius:8px;padding:8px;font-size:11px;font-weight:600;cursor:pointer\">編集<\u002Fbutton><button style=\"flex:1;background:#f4f2ec;border:1px solid #e7e3d9;border-radius:8px;padding:8px;font-size:11px;cursor:pointer\">地図<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!-- アンケート管理 -->\n                  <sc-if value=\"{{ show.aSurvey }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:16px\">\n                    <div>\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\"><div style=\"font-size:13px;font-weight:700\">アンケート一覧<\u002Fdiv><button style=\"background:#1f9268;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer\">＋ 作成<\u002Fbutton><\u002Fdiv>\n                      <div style=\"background:#fff;border:1px solid #e7e3d9;border-radius:14px;overflow:hidden\">\n                        <div style=\"padding:16px;border-bottom:1px solid #f0ede4\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:13px;font-weight:700\">夏の信州旅アンケート<\u002Fspan><span style=\"font-size:10px;background:#e9f2ec;color:#1f9268;border-radius:5px;padding:2px 8px\">公開中<\u002Fspan><\u002Fdiv><div style=\"font-size:11px;color:#8a8a7e;margin-top:5px\">設問5問 ・ 回答 643件 ・ 回答で+50pt<\u002Fdiv><\u002Fdiv>\n                        <div style=\"padding:16px;border-bottom:1px solid #f0ede4\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:13px;font-weight:700\">満足度調査（訪問後）<\u002Fspan><span style=\"font-size:10px;background:#e9f2ec;color:#1f9268;border-radius:5px;padding:2px 8px\">公開中<\u002Fspan><\u002Fdiv><div style=\"font-size:11px;color:#8a8a7e;margin-top:5px\">設問3問 ・ 回答 1,284件 ・ QR固定<\u002Fdiv><\u002Fdiv>\n                        <div style=\"padding:16px\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:13px;font-weight:700\">会員登録時アンケート<\u002Fspan><span style=\"font-size:10px;background:#f0ede4;color:#9a9a8e;border-radius:5px;padding:2px 8px\">下書き<\u002Fspan><\u002Fdiv><div style=\"font-size:11px;color:#8a8a7e;margin-top:5px\">設問4問 ・ 未公開<\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div>\n                      <div style=\"font-size:13px;font-weight:700;margin-bottom:14px\">回答分析：夏の信州旅アンケート<\u002Fdiv>\n                      <div style=\"background:#fff;border:1px solid #e7e3d9;border-radius:14px;padding:20px\">\n                        <div style=\"font-size:12px;font-weight:700;margin-bottom:14px\">Q1. 興味のある旅のテーマは？<\u002Fdiv>\n                        <div style=\"margin-bottom:13px\"><div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px\"><span>温泉・湯めぐり<\u002Fspan><span style=\"color:#8a8a7e\">42%<\u002Fspan><\u002Fdiv><div style=\"height:9px;background:#eceae2;border-radius:6px\"><div style=\"width:42%;height:100%;background:#1f9268;border-radius:6px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                        <div style=\"margin-bottom:13px\"><div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px\"><span>登山・ハイキング<\u002Fspan><span style=\"color:#8a8a7e\">28%<\u002Fspan><\u002Fdiv><div style=\"height:9px;background:#eceae2;border-radius:6px\"><div style=\"width:28%;height:100%;background:#4ea67e;border-radius:6px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                        <div style=\"margin-bottom:13px\"><div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px\"><span>グルメ・地酒<\u002Fspan><span style=\"color:#8a8a7e\">20%<\u002Fspan><\u002Fdiv><div style=\"height:9px;background:#eceae2;border-radius:6px\"><div style=\"width:20%;height:100%;background:#9ecbb3;border-radius:6px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                        <div><div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px\"><span>歴史・文化<\u002Fspan><span style=\"color:#8a8a7e\">10%<\u002Fspan><\u002Fdiv><div style=\"height:9px;background:#eceae2;border-radius:6px\"><div style=\"width:10%;height:100%;background:#cfe0d6;border-radius:6px\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!-- コミュニティ管理 -->\n                  <sc-if value=\"{{ show.aCommunity }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><div style=\"display:flex;gap:8px\"><div style=\"background:#16432f;color:#fff;border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600\">グループ一覧<\u002Fdiv><div style=\"background:#fff;border:1px solid #e7e3d9;border-radius:9px;padding:8px 14px;font-size:12px\">種別・タグマスター<\u002Fdiv><\u002Fdiv><button style=\"background:#1f9268;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer\">＋ グループ作成<\u002Fbutton><\u002Fdiv>\n                    <div style=\"background:#fff;border:1px solid #e7e3d9;border-radius:14px;overflow:hidden\">\n                      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 0.9fr 0.7fr;gap:8px;font-size:11px;color:#8a8a7e;font-weight:600;padding:13px 18px;background:#f9f7f1;border-bottom:1px solid #eceae2\"><span>グループ名<\u002Fspan><span>種別<\u002Fspan><span>参加者 / 上限<\u002Fspan><span>投稿数<\u002Fspan><span>状態<\u002Fspan><span><\u002Fspan><\u002Fdiv>\n                      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 0.9fr 0.7fr;gap:8px;font-size:12px;padding:14px 18px;border-bottom:1px solid #f0ede4;align-items:center\"><span style=\"font-weight:600\">信州トレッキング部<\u002Fspan><span><span style=\"font-size:10px;background:#e9f2ec;color:#1c7a55;border-radius:5px;padding:2px 8px\">アウトドア<\u002Fspan><\u002Fspan><span class=\"mono\">84 / 100<\u002Fspan><span class=\"mono\">128<\u002Fspan><span style=\"color:#1f9268;font-weight:600\">公開中<\u002Fspan><span style=\"color:#1c7a55;font-weight:600;cursor:pointer\">編集<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 0.9fr 0.7fr;gap:8px;font-size:12px;padding:14px 18px;border-bottom:1px solid #f0ede4;align-items:center\"><span style=\"font-weight:600\">信州そば愛好会<\u002Fspan><span><span style=\"font-size:10px;background:#f6edd9;color:#b9831e;border-radius:5px;padding:2px 8px\">グルメ<\u002Fspan><\u002Fspan><span class=\"mono\" style=\"color:#c0622f\">100 / 100<\u002Fspan><span class=\"mono\">94<\u002Fspan><span style=\"color:#1f9268;font-weight:600\">公開中<\u002Fspan><span style=\"color:#1c7a55;font-weight:600;cursor:pointer\">編集<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 0.9fr 0.7fr;gap:8px;font-size:12px;padding:14px 18px;border-bottom:1px solid #f0ede4;align-items:center\"><span style=\"font-weight:600\">温泉めぐりの会<\u002Fspan><span><span style=\"font-size:10px;background:#e9f2ec;color:#1c7a55;border-radius:5px;padding:2px 8px\">温泉<\u002Fspan><\u002Fspan><span class=\"mono\">56 / 80<\u002Fspan><span class=\"mono\">76<\u002Fspan><span style=\"color:#1f9268;font-weight:600\">公開中<\u002Fspan><span style=\"color:#1c7a55;font-weight:600;cursor:pointer\">編集<\u002Fspan><\u002Fdiv>\n                      <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 0.9fr 0.7fr;gap:8px;font-size:12px;padding:14px 18px;align-items:center\"><span style=\"font-weight:600\">写真で巡る信州<\u002Fspan><span><span style=\"font-size:10px;background:#e9eef2;color:#3f7fa3;border-radius:5px;padding:2px 8px\">カルチャー<\u002Fspan><\u002Fspan><span class=\"mono\">38 / 60<\u002Fspan><span class=\"mono\">42<\u002Fspan><span style=\"color:#9a9a8e;font-weight:600\">準備中<\u002Fspan><span style=\"color:#1c7a55;font-weight:600;cursor:pointer\">編集<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!--ADMIN-CONTENT-->\n\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!--SCREENS-->\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { side: 'member', screen: 'mypage' };\n\n  go(id) { this.setState({ screen: id }); }\n  pick(side) {\n    const first = side === 'member' ? 'mypage' : 'a-dash';\n    this.setState({ side, screen: first });\n  }\n\n  renderVals() {\n    const memberNav = [\n      { id: 'login',     label: 'ログイン / 会員登録', code: 'M-01' },\n      { id: 'mypage',    label: 'マイページ（3案）',   code: 'M-02' },\n      { id: 'point',     label: 'ポイント',            code: 'M-03' },\n      { id: 'lottery',   label: '抽選キャンペーン',     code: 'M-04' },\n      { id: 'community', label: 'ファンコミュニティ',   code: 'M-05' },\n      { id: 'visit',     label: '訪問スポット・地図',   code: 'M-06' },\n      { id: 'support',   label: 'サポート / ヘルプ',    code: 'M-07' },\n    ];\n    const adminNav = [\n      { id: 'a-login',     label: 'ログイン（MFA）',     code: 'A-01' },\n      { id: 'a-dash',      label: 'ダッシュボード',       code: 'A-02' },\n      { id: 'a-members',   label: '会員管理',            code: 'A-03' },\n      { id: 'a-member',    label: '会員詳細',            code: 'A-04' },\n      { id: 'a-lottery',   label: '抽選管理',            code: 'A-05' },\n      { id: 'a-point',     label: 'ポイント管理',         code: 'A-06' },\n      { id: 'a-spot',      label: '訪問スポット管理',      code: 'A-07' },\n      { id: 'a-survey',    label: 'アンケート管理',        code: 'A-08' },\n      { id: 'a-community', label: 'コミュニティ管理',      code: 'A-09' },\n    ];\n    const side = this.state.side;\n    const list = side === 'member' ? memberNav : adminNav;\n    const screen = this.state.screen;\n\n    const nav = list.map(it => {\n      const active = it.id === screen;\n      return {\n        ...it,\n        onClick: () => this.go(it.id),\n        style: `width:calc(100% - 16px);margin:1px 8px;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;text-align:left;transition:background .12s;`\n          + (active\n            ? 'background:#16432f;color:#f6f4ee;font-weight:600;'\n            : 'background:transparent;color:#3f463d;font-weight:500;'),\n        dotStyle: `width:6px;height:6px;border-radius:50%;flex:none;background:${active ? '#e7c987' : '#cfcabd'};`,\n      };\n    });\n\n    const allIds = [...memberNav, ...adminNav].map(i => i.id);\n    const show = {};\n    allIds.forEach(id => { show[id] = (id === screen); });\n    const camel = {};\n    Object.keys(show).forEach(k => { camel[k.replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = show[k]; });\n    Object.assign(show, camel);\n\n    const segOn = 'border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;padding:7px 16px;border-radius:8px;background:#1f9268;color:#fff;';\n    const segOff = 'border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;padding:7px 16px;border-radius:8px;background:transparent;color:#9cc4b1;';\n\n    const adminLabel = (adminNav.find(n => n.id === screen) || {}).label || '';\n    const aNav = adminNav.filter(n => n.id !== 'a-login').map(it => {\n      const active = it.id === screen;\n      return {\n        ...it,\n        onClick: () => this.go(it.id),\n        style: `width:100%;display:flex;align-items:center;gap:10px;padding:11px 16px;border:none;border-left:3px solid ${active ? '#e7c987' : 'transparent'};cursor:pointer;font-family:inherit;font-size:12.5px;text-align:left;`\n          + (active ? 'background:rgba(255,255,255,.09);color:#fff;font-weight:700;' : 'background:transparent;color:#a9c6b7;font-weight:500;'),\n      };\n    });\n    const adminApp = side === 'admin' && screen !== 'a-login';\n\n    const rankColor = { 'ゴールド': '#b9831e', 'シルバー': '#9aa0a6', 'ブロンズ': '#b08d57' };\n    const rawMembers = [\n      ['8742', '田中 信州', 'tanaka@…', 'ゴールド', '2,480', '12', '使用中'],\n      ['8741', '佐藤 花子', 'sato@…', 'シルバー', '1,120', '7', '使用中'],\n      ['8740', '鈴木 一郎', 'suzuki@…', 'ブロンズ', '340', '3', '使用中'],\n      ['8739', '高橋 美咲', 'takahashi@…', 'ゴールド', '3,050', '18', '使用中'],\n      ['8738', '伊藤 健', 'ito@…', 'シルバー', '880', '5', '退会'],\n      ['8737', '渡辺 由美', 'watanabe@…', 'ブロンズ', '120', '1', '使用中'],\n      ['8736', '山本 大輔', 'yamamoto@…', 'シルバー', '1,640', '9', '強制退会'],\n      ['8735', '中村 彩', 'nakamura@…', 'ゴールド', '2,910', '15', '使用中'],\n    ];\n    const statusChip = (s) => {\n      const map = { '使用中': 'background:#e9f2ec;color:#1f9268;', '退会': 'background:#f0ede4;color:#9a9a8e;', '強制退会': 'background:#f6e4dd;color:#c0622f;' };\n      return `font-size:10px;border-radius:5px;padding:2px 8px;font-weight:600;${map[s] || ''}`;\n    };\n    const members = rawMembers.map(r => ({\n      id: r[0], name: r[1], email: r[2], rank: r[3], point: r[4], visit: r[5], status: r[6],\n      rankStyle: `font-weight:600;color:${rankColor[r[3]] || '#5f665d'};`,\n      statusStyle: statusChip(r[6]),\n    }));\n\n    const lotStatus = (s) => {\n      const map = { '当選': 'background:#e9f2ec;color:#1f9268;', '落選': 'background:#f0ede4;color:#9a9a8e;', '抽選待ち': 'background:#f6edd9;color:#b9831e;' };\n      return `font-size:10px;border-radius:5px;padding:3px 9px;font-weight:700;${map[s] || ''}`;\n    };\n    const rawEntries = [\n      ['E-412', '田中 信州', '2026.06.08', '100', '当選'],\n      ['E-411', '高橋 美咲', '2026.06.08', '100', '抽選待ち'],\n      ['E-409', '中村 彩', '2026.06.07', '100', '抽選待ち'],\n      ['E-405', '佐藤 花子', '2026.06.06', '100', '落選'],\n      ['E-402', '渡辺 由美', '2026.06.05', '100', '落選'],\n      ['E-398', '山本 大輔', '2026.06.04', '100', '抽選待ち'],\n    ];\n    const entries = rawEntries.map(r => ({ id: r[0], name: r[1], date: r[2], point: r[3], status: r[4], statusStyle: lotStatus(r[4]) }));\n    return {\n      nav, show,\n      isAdmin: side === 'admin',\n      isMember: side === 'member',\n      adminApp, aNav, members, entries,\n      adminLabel,\n      navHeading: side === 'member' ? '会員側 ・ 画面一覧' : '管理側 ・ 画面一覧',\n      pickMember: () => this.pick('member'),\n      pickAdmin: () => this.pick('admin'),\n      tabMemberStyle: side === 'member' ? segOn : segOff,\n      tabAdminStyle: side === 'admin' ? segOn : segOff,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
